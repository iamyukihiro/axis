name: Release

on:
  push:
    branches:
      - release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release-macos-vst3:
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-latest
    env:
      JUCE_VERSION: 8.0.8

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(tr -d '[:space:]' < VERSION)"
          IFS='.' read -r major minor patch <<< "$current_version"
          next_version="${major}.${minor}.$((patch + 1))"

          printf '%s\n' "$next_version" > VERSION

          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "version=$next_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$next_version" >> "$GITHUB_OUTPUT"

      - name: Commit bumped VERSION
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.bump.outputs.tag }}"

      - name: Create tag
        run: git tag "${{ steps.bump.outputs.tag }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:release
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Clone JUCE
        run: git clone --depth 1 --branch "$JUCE_VERSION" https://github.com/juce-framework/JUCE.git JUCE

      - name: Configure
        run: cmake -B build -DJUCE_DIR="$GITHUB_WORKSPACE/JUCE"

      - name: Build
        run: cmake --build build --config Release

      - name: Package VST3
        run: |
          mkdir -p dist
          ditto -c -k --keepParent "build/AxisCenter_artefacts/VST3/Axis.vst3" "dist/Axis-${{ steps.bump.outputs.tag }}-macOS-vst3.zip"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: Axis-${{ steps.bump.outputs.tag }}-macOS-vst3
          path: dist/Axis-${{ steps.bump.outputs.tag }}-macOS-vst3.zip
          if-no-files-found: error

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            "dist/Axis-${{ steps.bump.outputs.tag }}-macOS-vst3.zip" \
            --title "${{ steps.bump.outputs.tag }}" \
            --generate-notes
